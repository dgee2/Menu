name: Dependency updates (copilot)
run-name: Dependency updates (${{ github.event_name == 'workflow_dispatch' && inputs['target-group'] || 'all groups' }})

on:
  workflow_dispatch:
    inputs:
      target-group:
        description: Dependency update group to process
        required: true
        default: all
        type: choice
        options:
          - all
          - dotnet
          - node
          - github-actions
  schedule:
    # Run weekly on Friday at 09:00 UTC so dependency PRs stay predictable and reviewable.
    - cron: '0 9 * * 5'

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_GROUP: ${{ inputs.target-group }}
        run: |
          DOTNET='{"group":"dotnet","name":".NET / NuGet updates","ecosystem":".NET / NuGet","branch_prefix":"copilot/dependency-update/dotnet"}'
          NODE='{"group":"node","name":"Node / npm / pnpm updates","ecosystem":"Node / npm / pnpm","branch_prefix":"copilot/dependency-update/node"}'
          GHA='{"group":"github-actions","name":"GitHub Actions updates","ecosystem":"GitHub Actions","branch_prefix":"copilot/dependency-update/github-actions"}'
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$TARGET_GROUP" != "all" ]]; then
            if [[ "$TARGET_GROUP" == "dotnet" ]]; then
              echo "matrix=[$DOTNET]" >> "$GITHUB_OUTPUT"
            elif [[ "$TARGET_GROUP" == "node" ]]; then
              echo "matrix=[$NODE]" >> "$GITHUB_OUTPUT"
            else
              echo "matrix=[$GHA]" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "matrix=[$DOTNET,$NODE,$GHA]" >> "$GITHUB_OUTPUT"
          fi

  dependency-update:
    needs: setup
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: dependency-update-${{ matrix.group }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Enable pnpm via Corepack
        run: corepack enable pnpm

      - name: Setup Copilot CLI
        uses: actions/setup-copilot@v0.0.5

      - name: Create or update dependency PRs with Copilot
        env:
          # Fine-grained PAT with "Copilot Requests" permission ÔÇô used by the Copilot CLI to
          # authenticate with the Copilot service. Store this as a repository secret named
          # COPILOT_TOKEN. See https://docs.github.com/en/copilot/how-tos/copilot-cli/automate-copilot-cli/automate-with-actions
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          # GH_TOKEN is used by git and the gh CLI for push / PR creation.
          GH_TOKEN: ${{ github.token }}
          PROMPT_ECOSYSTEM: ${{ matrix.ecosystem }}
          PROMPT_BRANCH_PREFIX: ${{ matrix.branch_prefix }}
          PROMPT_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          cat > /tmp/copilot-prompt.txt <<EOF
          Read ".github/prompts/dependency-update.prompt.md" and apply these repository skills:
          - dependency-update-repo-context
          - dependency-update-classification
          - dependency-update-validation
          - dependency-update-pr-description

          Assume the current workspace is the target repository and the current working directory is the repository root.

          Runtime parameters:
          - Ecosystem: ${PROMPT_ECOSYSTEM}
          - Branch prefix override: ${PROMPT_BRANCH_PREFIX}
          - Default branch override: ${PROMPT_DEFAULT_BRANCH}

          Use those runtime parameters when following the prompt and skills.
          If any required validation command fails, do not create or finalise a pull request and exit with a non-zero status code.
          EOF

          copilot \
            --allow-all-tools \
            --enable-all-github-mcp-tools \
            --autopilot \
            --no-ask-user \
            -p "$(cat /tmp/copilot-prompt.txt)"
