name: Build
# For more information on this YAML file, please reference blog: https://agramont.net/blog/devops-intro-deploy-net-aspire-azure-github-actions

on:
  workflow_dispatch:
  push:
    # Run when commits are pushed to mainline branch (main or master)
    # Set this to the mainline branch you are using
    branches:
      - master
      - main
  pull_request:
    branches: ["dev", "master", "main"]

permissions:
  contents: read

# Based from https://docs.github.com/en/actions/use-cases-and-examples/building-and-testing/building-and-testing-net
jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  backend-build:
    name: Backend build (OpenAPI artifact)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dotnet 10.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install .NET Aspire workload
        run: dotnet workload install aspire

      - name: Restore
        run: dotnet restore MenuApi.sln

      - name: Build solution (generate OpenAPI)
        run: dotnet build MenuApi.sln --configuration Release --no-restore

      - name: Upload OpenAPI document
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: open-api/menu-api.json
          if-no-files-found: error

      - name: Upload backend build outputs
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-output
          path: |
            Menu.ApiServiceDefaults/bin/Release/
            Menu.ApiServiceDefaults/obj/Release/
            Menu.AppHost/bin/Release/
            Menu.AppHost/obj/Release/
            Menu.MigrationService/bin/Release/
            Menu.MigrationService/obj/Release/
            Menu.ServiceDefaults/bin/Release/
            Menu.ServiceDefaults/obj/Release/
            MenuApi/bin/Release/
            MenuApi/obj/Release/
            MenuApi.Tests/bin/Release/
            MenuApi.Tests/obj/Release/
            MenuApi.Integration.Tests/bin/Release/
            MenuApi.Integration.Tests/obj/Release/
            MenuDB/bin/Release/
            MenuDB/obj/Release/
          if-no-files-found: error

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: backend-build
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dotnet 10.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install .NET Aspire workload
        run: dotnet workload install aspire

      - name: Download backend build outputs
        uses: actions/download-artifact@v4
        with:
          name: backend-build-output
          path: .
          merge-multiple: true

      - name: clean ssl cert
        run: dotnet dev-certs https --clean

      - name: trust ssl cert
        run: |
          dotnet dev-certs https --trust || true
          echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust:${SSL_CERT_DIR:-/usr/lib/ssl/certs}" >> "$GITHUB_ENV"

      - name: Test with the dotnet CLI
        run: dotnet test MenuApi.Tests/MenuApi.Tests.csproj --configuration Release --no-build --no-restore
        env:
          parameters__Auth0TestClientId: ${{ vars.AUTH0_CLIENT_ID }}
          parameters__Auth0TestClientSecret: ${{ secrets.AUTH0_CLIENT_SECRET }}
          parameters__Auth0Domain: ${{ vars.AUTH0_DOMAIN }}
          parameters__Auth0Audience: http://localhost:65273

  frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    needs: backend-build
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download OpenAPI document
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: open-api
          merge-multiple: true

      - name: Enable pnpm with corepack
        run: corepack enable pnpm

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'
          cache-dependency-path: ui/menu-website/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./ui/menu-website

      - name: Generate OpenAPI types
        run: pnpm run generate-openapi
        working-directory: ./ui/menu-website

      - name: Lint frontend
        run: pnpm run lint
        working-directory: ./ui/menu-website

      - name: Build frontend
        run: pnpm run build
        working-directory: ./ui/menu-website

      - name: Install Playwright browsers
        run: pnpm exec playwright install
        working-directory: ./ui/menu-website

      - name: Run frontend tests
        run: pnpm run test
        working-directory: ./ui/menu-website
